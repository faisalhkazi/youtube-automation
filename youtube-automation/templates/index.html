<!DOCTYPE html>
<html>
<head>
    <title>YouTube Automation</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 40px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 20px;
        }

        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 12px 25px;
            cursor: pointer;
        }

    </style>
</head>

<body>

<div class="container">

<h1>YouTube Automation</h1>

<form method="POST" action="/generate">

<label>Video Title</label>
<input type="text" name="title" required>

<label>Category</label>

<select name="category">

    <option>History</option>

    <option>Technology</option>

    <option>Motivation</option>

</select>

<label>Script</label>

<textarea rows="20" name="script" required></textarea>

<button type="submit">

Generate

</button>

</form>

</div>

</body>
</html>
